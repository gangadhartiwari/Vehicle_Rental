version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rental
      POSTGRES_PASSWORD: rental
      POSTGRES_DB: vehicle_rental
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rental -d vehicle_rental"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://rental:rental@db:5432/vehicle_rental
      SECRET_KEY: change-me-in-production-please
      APP_ENV: production
      DEBUG: "False"
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads

volumes:
  pgdata:
