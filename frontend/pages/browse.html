<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#4F46E5" />
  <title>Browse vehicles — Roadway</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body class="has-bottom-nav">

<div id="nav-host"></div>

<section style="padding: 22px 0 12px;">
  <div class="container">
    <p class="eyebrow">Browse</p>
    <h1 class="display mt-2">Find your ride</h1>
    <p class="muted mt-2 text-sm">Verified vehicles · transparent pricing · instant booking</p>
  </div>
</section>

<!-- Quick type chips -->
<section style="padding: 8px 0 12px;">
  <div class="container">
    <div class="filter-chips" id="type-chips">
      <button class="chip active" data-type="">All</button>
      <button class="chip" data-type="BIKE">🏍️ Bike</button>
      <button class="chip" data-type="CAR">🚗 Car</button>
      <button class="chip" data-type="AUTO">🛺 Auto</button>
    </div>
  </div>
</section>

<!-- Filters (collapsible on mobile) -->
<section style="padding: 8px 0 16px;">
  <div class="container">
    <div class="card">
      <button id="toggle-filters" class="btn btn-ghost btn-sm flex items-center gap-2" type="button" style="padding: 6px 0; margin-bottom: 8px;">
        <span style="font-size: 1rem;">⚙️</span>
        <span>More filters</span>
        <span id="toggle-arrow" style="margin-left: auto; transition: transform .2s;">▾</span>
      </button>

      <form id="filter-form">
        <div id="filter-body" class="hidden">
          <div class="field-row">
            <div class="field">
              <label class="label">City</label>
              <input class="input" name="city" placeholder="e.g. Indore" />
            </div>
            <div class="field">
              <label class="label">Fuel</label>
              <select class="select" name="fuel_type">
                <option value="">Any</option>
                <option value="PETROL">Petrol</option>
                <option value="DIESEL">Diesel</option>
                <option value="ELECTRIC">Electric</option>
                <option value="CNG">CNG</option>
              </select>
            </div>
          </div>
          <div class="field-row">
            <div class="field">
              <label class="label">Transmission</label>
              <select class="select" name="transmission">
                <option value="">Any</option>
                <option value="MANUAL">Manual</option>
                <option value="AUTOMATIC">Automatic</option>
              </select>
            </div>
            <div class="field">
              <label class="label">Min ₹/hr</label>
              <input class="input" type="number" name="min_price" min="0" placeholder="0" />
            </div>
          </div>
          <div class="field-row">
            <div class="field">
              <label class="label">Max ₹/hr</label>
              <input class="input" type="number" name="max_price" min="0" placeholder="500" />
            </div>
            <div class="field">
              <label class="label">Pickup at</label>
              <input class="input" type="datetime-local" name="pickup_at" />
            </div>
          </div>
          <div class="field">
            <label class="label">Drop-off at</label>
            <input class="input" type="datetime-local" name="dropoff_at" />
          </div>
        </div>

        <div class="flex gap-2 flex-wrap" style="justify-content: flex-end;">
          <button type="reset" class="btn btn-ghost btn-sm">Reset</button>
          <button type="submit" class="btn btn-primary btn-sm">Apply</button>
        </div>
      </form>
    </div>
  </div>
</section>

<!-- Results -->
<section style="padding: 8px 0 32px;">
  <div class="container">
    <div class="flex justify-between items-center mb-4">
      <p class="muted text-sm" id="result-count">Loading…</p>
    </div>
    <div id="results" class="grid grid-3"></div>
  </div>
</section>

<script src="../js/app.js"></script>
<script>
mountChrome('browse');

let currentType = '';

// Hydrate from query params
const initialParams = new URLSearchParams(location.search);
if (initialParams.get('vehicle_type')) {
  currentType = initialParams.get('vehicle_type');
  document.querySelectorAll('#type-chips .chip').forEach(c => c.classList.toggle('active', c.dataset.type === currentType));
}
['city', 'pickup_at', 'dropoff_at', 'fuel_type', 'transmission', 'min_price', 'max_price'].forEach(k => {
  const v = initialParams.get(k);
  if (v) {
    const el = document.querySelector(`[name=${k}]`);
    if (el) el.value = v;
  }
});

// Toggle advanced filters
const toggleBtn = document.getElementById('toggle-filters');
const filterBody = document.getElementById('filter-body');
const arrow = document.getElementById('toggle-arrow');
toggleBtn.addEventListener('click', () => {
  filterBody.classList.toggle('hidden');
  arrow.style.transform = filterBody.classList.contains('hidden') ? 'rotate(0deg)' : 'rotate(180deg)';
});

// Type chip handler
document.querySelectorAll('#type-chips .chip').forEach(c => {
  c.addEventListener('click', () => {
    document.querySelectorAll('#type-chips .chip').forEach(x => x.classList.remove('active'));
    c.classList.add('active');
    currentType = c.dataset.type || '';
    runSearch();
  });
});

async function loadVehicles(params = {}) {
  const grid = document.getElementById('results');
  grid.innerHTML = `
    <div class="card skeleton" style="height: 280px;"></div>
    <div class="card skeleton" style="height: 280px;"></div>
    <div class="card skeleton" style="height: 280px;"></div>
  `;
  try {
    const data = await api('/vehicles/search', { query: params });
    document.getElementById('result-count').textContent = `${data.length} vehicle${data.length !== 1 ? 's' : ''} found`;
    if (data.length === 0) {
      grid.innerHTML = `
        <div class="empty-state" style="grid-column: 1/-1;">
          <h3>No matches yet</h3>
          <p>Try widening your filters or pick a different city.</p>
        </div>`;
      return;
    }
    grid.innerHTML = data.map(v => vehicleCard(v)).join('');
  } catch (err) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><h3>Couldn't load</h3><p>${escapeHtml(err.message)}</p></div>`;
  }
}

function vehicleCard(v) {
  const img = vehicleImageUrl(v);
  const distance = v.distance_km ? `<span class="badge badge-neutral">${v.distance_km} km away</span>` : '';
  return `
    <a class="vehicle-card" href="vehicle-detail.html?id=${v.id}">
      <div class="v-image">
        ${img ? `<img src="${img}" alt="${escapeHtml(v.brand)} ${escapeHtml(v.model)}" onerror="this.style.display='none'"/>` : vehicleIcon(v.vehicle_type)}
      </div>
      <div class="v-body">
        <div class="flex justify-between items-start gap-2">
          <div style="min-width: 0; flex: 1;">
            <div class="v-title">${escapeHtml(v.brand)} ${escapeHtml(v.model)}</div>
            <div class="v-meta">${v.year} · ${v.fuel_type.toLowerCase()} · ${v.transmission.toLowerCase()} · ${v.seats} seats</div>
          </div>
          ${v.avg_rating > 0 ? starsHtml(v.avg_rating) : ''}
        </div>
        ${v.pickup_city ? `<p class="text-xs muted mt-2">📍 ${escapeHtml(v.pickup_city)}</p>` : ''}
        <div class="v-price-row">
          <div>
            <span class="v-price">${fmtMoney(v.hourly_rate)}</span><span class="v-rate-unit">/hr</span>
          </div>
          ${distance}
        </div>
      </div>
    </a>`;
}

function runSearch() {
  const fd = new FormData(document.getElementById('filter-form'));
  const params = {};
  if (currentType) params.vehicle_type = currentType;
  for (const [k, v] of fd.entries()) {
    if (v) params[k] = v;
  }
  loadVehicles(params);
}

document.getElementById('filter-form').addEventListener('submit', (e) => {
  e.preventDefault();
  runSearch();
});

document.getElementById('filter-form').addEventListener('reset', () => {
  setTimeout(() => {
    currentType = '';
    document.querySelectorAll('#type-chips .chip').forEach(c => c.classList.toggle('active', c.dataset.type === ''));
    runSearch();
  }, 0);
});

runSearch();
</script>

</body>
</html>
